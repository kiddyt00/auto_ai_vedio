<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文生音频</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      height: 150px;
      resize: vertical;
    }
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f9f9f9;
      border-radius: 4px;
    }
    .audio-list {
      margin-top: 10px;
    }
    .audio-item {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .audio-item audio {
      width: 100%;
      margin-top: 10px;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>文生音频</h1>
    
    <form id="audioForm">
      <div class="form-group">
        <label for="text">文本内容</label>
        <textarea id="text" placeholder="请输入要转换为音频的文本"></textarea>
      </div>
      
      <div class="form-group">
        <label for="model">AI模型</label>
        <select id="model">
          <option value="elevenlabs">ElevenLabs</option>
          <option value="aliyun">阿里云模型</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="voice">声音类型</label>
        <select id="voice">
          <option value="default">默认声音</option>
          <option value="male">男声</option>
          <option value="female">女声</option>
          <option value="child">童声</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="language">语言</label>
        <select id="language">
          <option value="zh">中文</option>
          <option value="en">英文</option>
          <option value="ja">日文</option>
          <option value="ko">韩文</option>
        </select>
      </div>
      
      <button type="submit">生成音频</button>
      <button type="button" onclick="window.location.href='/index.html'">返回首页</button>
    </form>
    
    <div class="loading" id="loading">
      <p>正在生成音频，请稍候...</p>
    </div>
    
    <div id="result" class="result" style="display: none;">
      <h3>生成结果</h3>
      <div id="audioList" class="audio-list"></div>
    </div>
    
    <div id="error" class="error" style="display: none;"></div>
  </div>
  
  <script>
    document.getElementById('audioForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const text = document.getElementById('text').value;
      const model = document.getElementById('model').value;
      const voice = document.getElementById('voice').value;
      const language = document.getElementById('language').value;
      
      // 显示加载状态
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('loading').classList.add('show');
      
      try {
        const response = await fetch('/api/audio/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            text,
            model,
            voice,
            language
          })
        });
        
        if (!response.ok) {
          throw new Error('生成音频失败');
        }
        
        const data = await response.json();
        
        // 显示结果
        const audioList = document.getElementById('audioList');
        audioList.innerHTML = '';
        
        data.chunks.forEach((chunk, index) => {
          const audioItem = document.createElement('div');
          audioItem.className = 'audio-item';
          audioItem.innerHTML = `
            <h4>音频片段 ${index + 1}</h4>
            <p>${chunk.text.substring(0, 100)}${chunk.text.length > 100 ? '...' : ''}</p>
            <audio controls>
              <source src="${chunk.audioUrl}" type="audio/mpeg">
              您的浏览器不支持音频播放。
            </audio>
            <button onclick="regenerateAudio('${chunk.chunkId}')">重新生成</button>
            <button onclick="selectAudio('${chunk.chunkId}')">选择</button>
          `;
          audioList.appendChild(audioItem);
        });
        
        document.getElementById('result').style.display = 'block';
      } catch (error) {
        document.getElementById('error').textContent = error.message;
        document.getElementById('error').style.display = 'block';
      } finally {
        document.getElementById('loading').classList.remove('show');
      }
    });
    
    function regenerateAudio(chunkId) {
      alert(`重新生成音频: ${chunkId}`);
    }
    
    function selectAudio(chunkId) {
      alert(`选择音频: ${chunkId}`);
    }
  </script>
</body>
</html>
