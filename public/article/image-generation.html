<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章生图</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      height: 200px;
      resize: vertical;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f9f9f9;
      border-radius: 4px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .image-item {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      text-align: center;
    }
    .image-item img {
      max-width: 100%;
      border-radius: 4px;
    }
    .image-item p {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>文章生图</h1>
    
    <form id="imageForm">
      <div class="form-group">
        <label for="article">文章内容</label>
        <textarea id="article" placeholder="请输入文章内容，系统将根据文章生成相关图片"></textarea>
      </div>
      
      <div class="form-group">
        <label for="model">AI模型</label>
        <select id="model">
          <option value="stable-diffusion">Stable Diffusion</option>
          <option value="aliyun">阿里云模型</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="count">生成图片数量</label>
        <input type="number" id="count" value="3" min="1" max="10">
      </div>
      
      <div class="form-group">
        <label for="style">图片风格</label>
        <select id="style">
          <option value="realistic">写实风格</option>
          <option value="cartoon">卡通风格</option>
          <option value="anime">动漫风格</option>
          <option value="oil-painting">油画风格</option>
        </select>
      </div>
      
      <button type="submit">生成图片</button>
      <button type="button" onclick="window.location.href='/index.html'">返回首页</button>
    </form>
    
    <div class="loading" id="loading">
      <p>正在生成图片，请稍候...</p>
    </div>
    
    <div id="result" class="result" style="display: none;">
      <h3>生成结果</h3>
      <div id="imageGrid" class="image-grid"></div>
    </div>
    
    <div id="error" class="error" style="display: none;"></div>
  </div>
  
  <script>
    document.getElementById('imageForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const article = document.getElementById('article').value;
      const model = document.getElementById('model').value;
      const count = document.getElementById('count').value;
      const style = document.getElementById('style').value;
      
      // 显示加载状态
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('loading').classList.add('show');
      
      try {
        const response = await fetch('/api/article/generate-images', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            article,
            model,
            count: parseInt(count),
            style
          })
        });
        
        if (!response.ok) {
          throw new Error('生成图片失败');
        }
        
        const data = await response.json();
        
        // 显示结果
        const imageGrid = document.getElementById('imageGrid');
        imageGrid.innerHTML = '';
        
        data.images.forEach(image => {
          const imageItem = document.createElement('div');
          imageItem.className = 'image-item';
          imageItem.innerHTML = `
            <img src="${image.imageUrl}" alt="Generated image">
            <p>描述: ${image.sentence.substring(0, 50)}${image.sentence.length > 50 ? '...' : ''}</p>
            <p>风格: ${image.style}</p>
            <button onclick="regenerateImage('${image.id}', '${image.prompt}')">重新生成</button>
            <button onclick="selectImage('${image.id}')">选择</button>
          `;
          imageGrid.appendChild(imageItem);
        });
        
        document.getElementById('result').style.display = 'block';
      } catch (error) {
        document.getElementById('error').textContent = error.message;
        document.getElementById('error').style.display = 'block';
      } finally {
        document.getElementById('loading').classList.remove('show');
      }
    });
    
    function regenerateImage(imageId, prompt) {
      // 重新生成图片的逻辑
      alert(`重新生成图片: ${imageId}`);
    }
    
    function selectImage(imageId) {
      // 选择图片的逻辑
      alert(`选择图片: ${imageId}`);
    }
  </script>
</body>
</html>
